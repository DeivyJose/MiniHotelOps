<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Huéspedes - MiniHotelOps</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h2>Gestión de Huéspedes</h2>
    <p>Registro de clientes del hotel</p>
</header>

<nav>
    <a href="index.html"><button>Inicio</button></a>
    <a href="dashboard.html"><button>Dashboard</button></a>
    <a href="habitaciones.html"><button>Habitaciones</button></a>
    <a href="servicios.html"><button>Servicios</button></a>
    <a href="reservas.html"><button>Reservas</button></a>
</nav>

<div class="container">
    <div class="card">
        <h3>Nuevo Huésped</h3>
        <div class="form-grid">
            <input id="nombre" placeholder="Nombre">
            <input id="apellido" placeholder="Apellido">
            <input id="documento" placeholder="Documento">
            <input id="telefono" placeholder="Teléfono">
            <input id="email" placeholder="Correo">
            <input id="direccion" placeholder="Dirección">
            <input id="fechaNacimiento" type="date" required>
        </div>
        <br>
        <button onclick="crearHuesped()">Guardar huésped</button>
        <p id="mensaje" class="message"></p>
    </div>

    <div class="card">
        <h3>Huéspedes Registrados</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre completo</th>
                        <th>Documento</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaHuespedes"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
async function cargarHuespedes() {
    try {
        const huespedes = await request("/Huespedes");
        const tabla = document.getElementById("tablaHuespedes");

        tabla.innerHTML = "";

        huespedes.forEach(h => {
            tabla.innerHTML += `
                <tr>
                    <td>${h.id}</td>
                    <td>${h.nombreCompleto}</td>
                    <td>${h.documento}</td>
                    <td>${h.telefono}</td>
                    <td>${h.email}</td>
                    <td>
                        <button class="btn-danger" onclick="eliminarHuesped(${h.id})">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `;
        });
    } catch (error) {
        showMessage("mensaje", error.message, "error");
    }
}

async function crearHuesped() {
    try {
        const fechaInput = document.getElementById("fechaNacimiento").value;

        const data = {
            nombre: getValue("nombre"),
            apellido: getValue("apellido"),
            documento: getValue("documento"),
            telefono: getValue("telefono"),
            email: getValue("email"),
            direccion: getValue("direccion"),
            fechaNacimiento: fechaInput ? new Date(fechaInput).toISOString() : null
        };

        await request("/Huespedes", {
            method: "POST",
            body: JSON.stringify(data)
        });

        clearInputs([
            "nombre",
            "apellido",
            "documento",
            "telefono",
            "email",
            "direccion",
            "fechaNacimiento"
        ]);

        showMessage("mensaje", "Huésped guardado correctamente.", "success");
        cargarHuespedes();
    } catch (error) {
        showMessage("mensaje", error.message, "error");
    }
}

async function eliminarHuesped(id) {
    if (!confirm("¿Seguro que quieres eliminar este huésped?")) return;

    try {
        await request(`/Huespedes/${id}`, {
            method: "DELETE"
        });

        showMessage("mensaje", "Huésped eliminado correctamente.", "success");
        cargarHuespedes();
    } catch (error) {
        showMessage("mensaje", error.message, "error");
    }
}

cargarHuespedes();
</script>

</body>
</html>
