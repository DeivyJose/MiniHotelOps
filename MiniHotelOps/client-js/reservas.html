<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservas - MiniHotelOps</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h2>Gestión de Reservas</h2>
    <p>Creación de reservas con validación de disponibilidad</p>
</header>

<nav>
    <a href="index.html"><button>Inicio</button></a>
    <a href="dashboard.html"><button>Dashboard</button></a>
    <a href="habitaciones.html"><button>Habitaciones</button></a>
    <a href="huespedes.html"><button>Huéspedes</button></a>
    <a href="servicios.html"><button>Servicios</button></a>
</nav>

<div class="container">
    <div class="card">
        <h3>Nueva Reserva</h3>
        <div class="form-grid">
            <input id="huespedId" type="number" placeholder="ID del huésped">
            <input id="habitacionId" type="number" placeholder="ID de habitación">
            <input id="fechaEntrada" type="date">
            <input id="fechaSalida" type="date">
            <input id="cantidadPersonas" type="number" placeholder="Cantidad de personas">
        </div>
        <br>
        <button onclick="crearReserva()">Crear reserva</button>
        <p id="mensaje" class="message"></p>
    </div>

    <div class="card">
        <h3>Ayuda rápida</h3>
        <p>Primero crea un huésped y una habitación. Luego usa sus IDs para crear la reserva.</p>
        <p>El sistema valida fechas, capacidad y disponibilidad.</p>
    </div>
</div>

<script src="js/app.js"></script>
<script>
async function crearReserva() {
    try {
        const data = {
            huespedId: parseInt(getValue("huespedId")),
            habitacionId: parseInt(getValue("habitacionId")),
            fechaEntrada: getValue("fechaEntrada"),
            fechaSalida: getValue("fechaSalida"),
            cantidadPersonas: parseInt(getValue("cantidadPersonas"))
        };

        await request("/Reservas", {
            method: "POST",
            body: JSON.stringify(data)
        });

        clearInputs(["huespedId", "habitacionId", "fechaEntrada", "fechaSalida", "cantidadPersonas"]);
        showMessage("mensaje", "Reserva creada correctamente.", "success");
    } catch (error) {
        showMessage("mensaje", error.message, "error");
    }
}
</script>

</body>
</html>
